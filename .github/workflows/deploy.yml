name: Build and Deploy Next.js App to EKS

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  AWS_REGION: us-east-1                   # set this to your preferred AWS region, e.g. us-west-1
  ECR_REPOSITORY: portfolio-app           # set this to your Amazon ECR repository name
  EKS_CLUSTER_NAME: devops-cluster        # set this to your Amazon EKS cluster name

jobs:
  build:
    name: Build, Test, and Push Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Lint Codebase
        run: npm run lint
        
      - name: Build Production Next.js App
        run: npm run build
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: \${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: \${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: \${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: \${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: \${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
  deploy:
    name: Deploy to Amazon EKS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: \${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: \${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: \${{ env.AWS_REGION }}
          
      - name: Update KubeConfig
        run: aws eks update-kubeconfig --name \${{ env.EKS_CLUSTER_NAME }} --region \${{ env.AWS_REGION }}
        
      - name: Deploy to Kubernetes
        run: |
          # Example Helm upgrade or kubectl apply
          # helm upgrade --install portfolio-app ./helm-chart \
          #   --set image.tag=\${{ github.sha }}
          echo "Deployment successful for commit \${{ github.sha }} to \${{ env.EKS_CLUSTER_NAME }}"
